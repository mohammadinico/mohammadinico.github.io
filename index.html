<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
            margin: 0;
            /* CHANGED: Allow vertical scrolling if screen is small */
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .dancing-script { font-family: 'Dancing Script', cursive; }
        
        .heart {
            position: absolute;
            color: #fb7185;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        #yesButton {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .success-bounce {
            animation: success-bounce 1s infinite;
        }
        @keyframes success-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="app" class="z-10 w-full flex justify-center px-4 py-8">
        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full text-center border-4 border-white/50 relative">
            <h1 id="question-text" class="dancing-script text-4xl sm:text-6xl text-pink-600 mb-8 leading-tight">
                Will you be my valentine?
            </h1>
            
            <div id="media-container" class="mb-8 overflow-hidden rounded-2xl border-4 border-pink-200 shadow-lg bg-white/50 h-64 flex items-center justify-center">
                <img id="main-image" src="char.png" class="h-full w-full object-contain" alt="Character" />
            </div>

            <div id="button-container" class="flex flex-col sm:flex-row items-center justify-center gap-6 mt-4 relative min-h-[140px]">
                <button id="yesButton" class="bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-full shadow-lg z-50 whitespace-nowrap px-10 py-4 text-xl active:scale-95">
                    Yes!
                </button>
                <button id="noButton" class="bg-white/80 hover:bg-gray-100 text-gray-700 font-semibold py-3 px-8 rounded-full transition-all duration-200 shadow-md border border-gray-100 z-10">
                    No
                </button>
            </div>
        </div>
    </div>

    <script>
        const noButton = document.getElementById('noButton');
        const yesButton = document.getElementById('yesButton');
        const questionText = document.getElementById('question-text');
        const mainImage = document.getElementById('main-image');
        const buttonContainer = document.getElementById('button-container');
        const appContainer = document.querySelector('.glass-card');

        const noPhrases = [
            "No", 
            "Are you sure?", 
            "Really?", 
            "Think again!", 
            "Last chance!", 
            "Surely not?", 
            "You're breaking my heart! ;(", 
            "I'm gonna cry...", 
            "PLEASEEE", 
            "Just click Yes already ❤️"
        ];

        let noCount = 0;

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        setInterval(createHeart, 400);

        noButton.addEventListener('click', () => {
            noCount++;
            
            // Growth logic
            const scale = 1 + (noCount * 0.55);
            yesButton.style.transform = `scale(${scale})`;
            
            // Move Yes button to the front if it gets huge
            if (noCount > 4) {
                yesButton.style.zIndex = "100";
            }

            // Change No button text
            if (noCount < noPhrases.length) {
                noButton.innerText = noPhrases[noCount];
            } else {
                noButton.style.display = 'none';
            }

            // If it's really big, center it
            if (noCount > 8) {
                yesButton.style.position = 'fixed';
                yesButton.style.top = '50%';
                yesButton.style.left = '50%';
                yesButton.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        });

        yesButton.addEventListener('click', () => {
            appContainer.innerHTML = `
                <div class="animate-in fade-in zoom-in duration-500">
                    <h1 class="dancing-script text-5xl sm:text-6xl text-pink-600 mb-8">Thanks fine shyt</h1>
                    <div class="rounded-3xl overflow-hidden border-4 border-pink-100 shadow-inner mb-8">
                        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHIwdWswYnd3Mml3OWJ4emN5bWR4Zmt5Mjd3Znd3Znd3Znd3Znd3ZndmJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/MDJ9IbxxvDUQM/giphy.gif" alt="Success Cat" class="w-full h-auto" />
                    </div>
                    <div class="flex justify-center gap-4 text-4xl animate-bounce">
                        🌸 💖 🌸
                    </div>
                </div>
            `;
            // Shower of hearts
            for(let i=0; i<40; i++) {
                setTimeout(createHeart, i * 100);
            }
        });
    </script>
</body>
</html>
