<html lang="en">

<title>Dinner for Charlotte 🌹</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0a0a; font-family: Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }

  #controls { margin-bottom: 1.2rem; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  #controls button { padding: 7px 16px; border-radius: 999px; border: 1px solid rgba(220,100,120,0.4); background: transparent; color: rgba(245,192,200,0.5); font-family: Georgia,serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  #controls button.active { background: rgba(232,112,138,0.25); border-color: #e8708a; color: #f5c0c8; }

  #generate-btn { padding: 12px 32px; background: linear-gradient(135deg,#c0394f,#e8708a); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-family: Georgia,serif; cursor: pointer; margin-bottom: 1.2rem; letter-spacing: 0.04em; }
  #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #card {
    width: 420px; max-width: 100%;
    background: linear-gradient(145deg, #2a0e18, #1e0a12);
    border: 1px solid rgba(232,112,138,0.3);
    border-radius: 20px;
    padding: 28px 24px 24px;
    box-shadow: 0 0 60px rgba(200,60,90,0.2);
    display: none;
  }
  #card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  #card-header img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; object-position: center top; border: 2px solid rgba(232,112,138,0.7); }
  #card-header .title { color: #f5c0c8; font-size: 1.15rem; font-weight: normal; letter-spacing: 0.03em; }
  #card-header .sub { color: rgba(245,192,200,0.45); font-size: 0.75rem; margin-top: 3px; }
  #card-content { color: rgba(245,220,225,0.88); font-size: 0.88rem; line-height: 1.75; white-space: pre-wrap; }
  #card-footer { margin-top: 16px; text-align: right; color: rgba(245,192,200,0.25); font-size: 0.7rem; letter-spacing: 0.05em; }

  #download-btn { margin-top: 1rem; padding: 11px 28px; background: transparent; border: 1px solid rgba(232,112,138,0.5); border-radius: 10px; color: #f5c0c8; font-family: Georgia,serif; font-size: 0.9rem; cursor: pointer; display: none; }
  #download-btn:hover { background: rgba(232,112,138,0.1); }

  #status { color: rgba(245,192,200,0.5); font-size: 0.85rem; min-height: 24px; margin-bottom: 0.5rem; }
</style>
</head>

<button id="download-btn" onclick="downloadImage()">⬇️ Download & Send on WhatsApp</button>

<script>
const selected = new Set();

function toggle(btn) {
  const v = btn.dataset.val;
  if (selected.has(v)) { selected.delete(v); btn.classList.remove('active'); }
  else { selected.add(v); btn.classList.add('active'); }
}

async function generate() {
  const btn = document.getElementById('generate-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = "Finding the perfect dinner for Charlotte… 🍽️";
  document.getElementById('card').style.display = 'none';
  document.getElementById('download-btn').style.display = 'none';

  const prefs = selected.size > 0 ? [...selected].join(', ') : 'no specific preference';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: 'Give 4 delicious dinner recommendations for my beautiful girlfriend Charlotte Stoffels. Preferences: ' + prefs + '. For each: emoji + dish name, one sentence description, protein amount, cook time. Be warm and sweet!'
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Could not get recommendations.';
    document.getElementById('card-content').textContent = text;
    document.getElementById('card').style.display = 'block';
    document.getElementById('download-btn').style.display = 'inline-block';
    status.textContent = "Here you go! Download and send to Charlotte 💌";
  } catch(e) {
    status.textContent = "Something went wrong. Try again!";
  }
  btn.disabled = false;
}

async function downloadImage() {
  const card = document.getElementById('card');
  const canvas = await html2canvas(card, { backgroundColor: null, scale: 2 });
  const link = document.createElement('a');
  link.download = 'dinner-for-charlotte.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
