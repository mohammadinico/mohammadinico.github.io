<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0a0a; font-family: Georgia, serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
  h2 { color: #f5c0c8; font-weight: normal; font-size: 1rem; margin-bottom: 1rem; letter-spacing: 0.04em; opacity: 0.6; }
  #controls { margin-bottom: 1.2rem; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  #controls button { padding: 7px 16px; border-radius: 999px; border: 1px solid rgba(220,100,120,0.4); background: transparent; color: rgba(245,192,200,0.5); font-family: Georgia,serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  #controls button.active { background: rgba(232,112,138,0.25); border-color: #e8708a; color: #f5c0c8; }
  #generate-btn { padding: 12px 32px; background: linear-gradient(135deg,#c0394f,#e8708a); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-family: Georgia,serif; cursor: pointer; margin-bottom: 1.2rem; letter-spacing: 0.04em; }
  #card { width: 420px; max-width: 100%; background: linear-gradient(145deg,#2a0e18,#1e0a12); border: 1px solid rgba(232,112,138,0.3); border-radius: 20px; padding: 24px; box-shadow: 0 0 60px rgba(200,60,90,0.2); display: none; }
  #card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  #card-header img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; object-position: center top; border: 2px solid rgba(232,112,138,0.7); }
  #card-header .title { color: #f5c0c8; font-size: 1.1rem; font-weight: normal; letter-spacing: 0.03em; }
  #card-header .sub { color: rgba(245,192,200,0.45); font-size: 0.75rem; margin-top: 3px; }
  .meal { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; border-left: 2px solid rgba(232,112,138,0.4); }
  .meal-name { color: #f5c0c8; font-size: 0.95rem; margin-bottom: 4px; }
  .meal-desc { color: rgba(245,220,225,0.7); font-size: 0.8rem; line-height: 1.5; }
  .meal-meta { color: rgba(232,112,138,0.6); font-size: 0.75rem; margin-top: 5px; }
  #card-footer { margin-top: 14px; text-align: right; color: rgba(245,192,200,0.2); font-size: 0.7rem; }
  #download-btn { margin-top: 1rem; padding: 11px 28px; background: transparent; border: 1px solid rgba(232,112,138,0.5); border-radius: 10px; color: #f5c0c8; font-family: Georgia,serif; font-size: 0.9rem; cursor: pointer; display: none; }
  #download-btn:hover { background: rgba(232,112,138,0.1); }
</style>
</head>

<script>
const ALL_MEALS = [
  { name:"🍗 Garlic Butter Chicken", desc:"Juicy chicken breast pan-fried in garlic herb butter, served with rice.", meta:"~35g protein · 20 min", tags:["protein","quick"] },
  { name:"🐟 Oven-Baked Salmon", desc:"Salmon fillet with lemon, olive oil and garlic. Serve with roasted veggies.", meta:"~34g protein · 15 min", tags:["protein","quick","lowcarb"] },
  { name:"🥩 Beef Stir-Fry", desc:"Ground beef with soy sauce, garlic and bell peppers over rice.", meta:"~30g protein · 20 min", tags:["protein","quick"] },
  { name:"🍳 Shakshuka", desc:"Eggs poached in spiced tomato sauce — looks fancy, barely any effort.", meta:"~18g protein · 20 min", tags:["quick","veggie","comfort"] },
  { name:"🥗 Greek Chicken Bowl", desc:"Grilled chicken, cucumber, tomato, feta and tzatziki over rice.", meta:"~38g protein · 25 min", tags:["protein","lowcarb"] },
  { name:"🍜 Tuna Pasta", desc:"Canned tuna with pasta, olive oil, garlic and cherry tomatoes.", meta:"~28g protein · 15 min", tags:["quick","protein"] },
  { name:"🌮 Turkey Wraps", desc:"Sliced turkey with hummus, spinach and veggies in a warm tortilla.", meta:"~25g protein · 10 min", tags:["quick","protein"] },
  { name:"🍲 Lentil Dal", desc:"Red lentils simmered in coconut milk with garlic, cumin and tomato.", meta:"~18g protein · 30 min", tags:["veggie","comfort"] },
  { name:"🥘 Chicken Thigh Traybake", desc:"Honey-garlic chicken thighs roasted with potatoes and veg — one tray, no fuss.", meta:"~32g protein · 40 min", tags:["protein","comfort"] },
  { name:"🍣 Teriyaki Salmon Bowl", desc:"Pan-fried salmon with teriyaki glaze over steamed rice and edamame.", meta:"~36g protein · 20 min", tags:["protein","quick"] },
  { name:"🥦 Veggie Omelette", desc:"Fluffy 3-egg omelette stuffed with spinach, mushrooms and melted cheese.", meta:"~22g protein · 10 min", tags:["quick","veggie","lowcarb","protein"] },
  { name:"🍛 Chickpea Curry", desc:"Chickpeas in a creamy tomato-coconut curry sauce with naan bread.", meta:"~15g protein · 25 min", tags:["veggie","comfort"] },
  { name:"🥩 Steak and Salad", desc:"Pan-seared steak with a simple rocket and parmesan salad.", meta:"~40g protein · 15 min", tags:["protein","quick","lowcarb"] },
  { name:"🍝 Bolognese", desc:"Classic minced beef ragu slow-simmered with tomatoes over spaghetti.", meta:"~32g protein · 40 min", tags:["protein","comfort"] },
  { name:"🫘 Black Bean Tacos", desc:"Spiced black beans with avocado, salsa and sour cream in corn tortillas.", meta:"~14g protein · 15 min", tags:["veggie","quick"] },
  { name:"🍤 Prawn Stir-Fry", desc:"Juicy prawns with garlic, ginger, soy sauce and noodles.", meta:"~26g protein · 15 min", tags:["protein","quick"] },
];

const selected = new Set();

function toggle(btn) {
  const t = btn.dataset.tag;
  if (selected.has(t)) { selected.delete(t); btn.classList.remove('active'); }
  else { selected.add(t); btn.classList.add('active'); }
}

function generate() {
  let pool = selected.size === 0
    ? ALL_MEALS
    : ALL_MEALS.filter(m => [...selected].some(t => m.tags.includes(t)));
  if (pool.length < 4) pool = ALL_MEALS;

  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 4);

  document.getElementById('meals').innerHTML = shuffled.map(m =>
    '<div class="meal"><div class="meal-name">' + m.name + '</div><div class="meal-desc">' + m.desc + '</div><div class="meal-meta">' + m.meta + '</div></div>'
  ).join('');

  document.getElementById('card').style.display = 'block';
  document.getElementById('download-btn').style.display = 'inline-block';
}

async function downloadImage() {
  const card = document.getElementById('card');
  const canvas = await html2canvas(card, { backgroundColor: '#1e0a12', scale: 2 });
  const link = document.createElement('a');
  link.download = 'dinner-for-charlotte.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
